<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>iPhone Calculator</title>

    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div class="calculator">

        <!-- Display -->
        <div id="display">0</div>

        <!-- Buttons -->
        <div class="buttons">

            <button class="gray">AC</button>
            <button class="gray">+/-</button>
            <button class="gray">%</button>
            <button class="orange">÷</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="orange">×</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="orange">−</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="orange">+</button>

            <button class="zero">0</button>
            <button>.</button>
            <button class="orange">=</button>

        </div>

    </div>

    <script src="srcipt1.js"></script>

</body>
</html>
